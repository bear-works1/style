function fileToScaledDataURL(file, max = 380, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        // [[ VISION_AI: BACKGROUND_REMOVAL ]]  plug a real segmentation model here.
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  for (const cat of Object.keys(map)) if (map[cat].some((k) => n.includes(k))) return cat;
  return "tops";
}

}

function analyzeUndertone(dataURL) {
  return new Promise((resolve) => {
    // [[ VISION_AI: SKIN_UNDERTONE ]]  we sample average warmth then DISCARD the image.
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      c.width = 40; c.height = 40;
      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0, 40, 40);
      const d = ctx.getImageData(0, 0, 40, 40).data;
      let r = 0, g = 0, b = 0, n = 0;
      for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i + 1]; b += d[i + 2]; n++; }
      r /= n; g /= n; b /= n;
      const warmth = r - b;
      resolve(warmth > 22 ? "warm" : warmth < 6 ? "cool" : "neutral"); // image never stored
    };
    img.onerror = () => resolve("neutral");
    img.src = dataURL;
  });
}

function getWeather(city) {
  // [[ API: WEATHER ]]  swap for a live call (Open-Meteo / OpenWeather) keyed on the city.
  const c = CITIES.find((x) => x.name === city) || CITIES[0];
  const day = Math.floor(Date.now() / 86400000);
  const wiggle = ((day * 7 + c.name.length * 3) % 11) - 5;
  const tempF = Math.max(28, Math.min(98, c.base + wiggle));
  const icon = { sunny: "☀️", clear: "🌤️", cloudy: "☁️", rainy: "🌧️", humid: "🌥️", windy: "🌬️" }[c.mood] || "🌤️";
  return { tempF, cond: c.mood, icon, city: c.name };
}
const tempBand = (f) => (f < 50 ? "cold" : f > 78 ? "hot" : "mild");

/* ----------------------------------------------------------------------- */
/* OUTFIT ENGINE                                                             */

function scoreItem(item, ctx, seed = 0) {
  // [[ AI: OUTFIT_GENERATION ]]  transparent scoring stands in for a real model.
  let s = 1;
  const prof = ctx.profile;
  if (item.aesthetics.some((a) => prof.aesthetics.includes(a))) s += 2.5;
  if (colorFamilies(item.color).some((f) => prof.colorFamilies.includes(f))) s += 1.5;
  if (item.occasions.includes(ctx.occasion)) s += 2.5;
  const band = tempBand(ctx.weather.tempF);
  if (band === "cold") s += item.warmth === 3 ? 2 : item.warmth === 2 ? 1 : -1.5;
  if (band === "hot") s += item.warmth === 1 ? 2 : item.warmth === 2 ? 0.5 : -1.5;
  if (prof.undertone === "warm" && colorFamilies(item.color).includes("earth tones")) s += 0.6;
  if (prof.undertone === "cool" && colorFamilies(item.color).some((f) => f === "pastels" || f === "all black")) s += 0.6;
  s += Math.abs(Math.sin(seed * 999 + item.id.charCodeAt(0))) * 1.4;
  return s;
}
function rank(items, ctx, seed) {
  return [...items].map((it) => ({ it, s: scoreItem(it, ctx, seed) })).sort((a, b) => b.s - a.s).map((x) => x.it);
}
function buildOutfit(closet, ctx, seed = 0) {
  const clean = closet.filter((i) => i.clean);
  const by = (cat) => rank(clean.filter((i) => i.category === cat), ctx, seed);
  const tops = by("tops"), bottoms = by("bottoms"), dresses = by("dresses");
  const shoes = by("shoes"), bags = by("bags"), accs = by("accessories");
  const slots = [];
  const wantDress = dresses.length > 0 && (seed % 3 === 0 || tops.length === 0 || bottoms.length === 0);
  if (wantDress) slots.push({ slot: "dress", item: dresses[0], options: dresses });
  else {
    if (tops[0]) slots.push({ slot: "top", item: tops[0], options: tops });
    if (bottoms[0]) slots.push({ slot: "bottom", item: bottoms[0], options: bottoms });
  }
  if (shoes[0]) slots.push({ slot: "shoes", item: shoes[0], options: shoes });
  if (bags[0]) slots.push({ slot: "bag", item: bags[0], options: bags });
  if (accs[0]) slots.push({ slot: "accessory", item: accs[0], options: accs });
  return slots.filter((s) => s.item);
}

/* ----------------------------------------------------------------------- */
/* STYLIST CHAT                                                              */

function stylistReply(message, state, ctx, helpers) {
  // [[ AI: STYLIST_CHAT ]]  replace with a real model constrained to owned items.
  const m = message.toLowerCase();
  const closet = state.closet;
  const clean = closet.filter((i) => i.clean);
  const named = closet.find((i) => m.includes(i.name.toLowerCase()));

  if (/(what('?s| is)? clean|in the wash|laundry|available)/.test(m)) {
    const dirty = closet.filter((i) => !i.clean);
    return { text: `You have ${clean.length} clean pieces ready to wear` +
      (dirty.length ? `, and ${dirty.length} in the wash (${dirty.map((d) => d.name).join(", ")}).` : ".") +
      ` Clean right now: ${clean.slice(0, 8).map((c) => c.name).join(", ")}${clean.length > 8 ? "…" : ""}.` };
  }
  if (named && /(go(es)? with|pair|match|style|wear with)/.test(m)) {
    const pool = clean.filter((i) => i.id !== named.id && i.category !== named.category);
    const picks = rank(pool, ctx, Date.now()).slice(0, 3);
    return { text: picks.length
      ? `Your ${named.name} pairs nicely with: ${picks.map((p) => p.name).join(", ")}. That leans ${state.profile.aesthetics[0] || "classic"} and works for ${ctx.occasion}.`
      : `I'd pair your ${named.name} with more pieces, but everything else is in the wash. Want to mark something clean?` };
  }
  const occ = OCCASIONS.find((o) => m.includes(o.split(" ")[0]));
  if (occ || /(outfit|look|wear|dress me|ootd)/.test(m)) {
    const outfit = buildOutfit(closet, { ...ctx, occasion: occ || ctx.occasion }, Date.now() % 1000);
    if (!outfit.length) return { text: "Your closet's looking bare or everything's in the wash — add a few items and I'll style you." };
    return { text: `For ${occ || ctx.occasion} in ${ctx.weather.tempF}° ${ctx.weather.icon}: ${outfit.map((s) => s.item.name).join(" + ")}. Tap below to load it on the Outfit screen.`, outfit };
  }
  if (/(warmer|cold|colder|warm|cozy|layer)/.test(m)) {
    const warm = rank(clean.filter((i) => i.warmth >= 2), ctx, Date.now()).slice(0, 3);
    return { text: warm.length ? `To warm a look up, layer in: ${warm.map((w) => w.name).join(", ")}.` : "You don't have warmer layers clean right now." };
  }
  if (/(save|go-to|favorite|favourite|remember this)/.test(m)) {
    if (helpers && helpers.lastOutfit && helpers.lastOutfit.length) { helpers.saveOutfit(helpers.lastOutfit); return { text: "Saved that as a go-to look — find it under Outfit of the Day → Saved." }; }
    return { text: "Open the Outfit screen, generate a look you like, then ask me to save it." };
  }
  return { text: `I can build an outfit for an occasion, tell you what pairs with a piece, make a look warmer, check what's clean, or save a go-to. You've got ${clean.length} clean items to work with.` };
}

function recreate(look, closet) {
  const clean = closet.filter((i) => i.clean);
  const chosen = []; let filled = 0;
  for (const cat of look.need) {
    const pool = clean.filter((i) => i.category === cat);
    const matchBoth = pool.find((i) => i.aesthetics.some((a) => look.aesthetics.includes(a)) && colorFamilies(i.color).some((f) => look.families.includes(f)));
    const matchOne = pool.find((i) => i.aesthetics.some((a) => look.aesthetics.includes(a)) || colorFamilies(i.color).some((f) => look.families.includes(f)));
    const pick = matchBoth || matchOne || pool[0];
    if (pick) { chosen.push(pick); filled++; } else chosen.push({ missing: true, category: cat });
  }
  return { chosen, pct: Math.round((filled / look.need.length) * 100), missing: look.need.length - filled };
}

function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) + amt, g = ((n >> 8) & 255) + amt, b = (n & 255) + amt;
  r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
  return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, "0")}`;
}

/* OUTFIT OF THE DAY */
function OutfitOfDay({ state, ctx, weather, setProfile, saveOutfit, markWorn, setView, lastOutfit, pendingOutfit }) {
  const [seed, setSeed] = useState(0);
  const [outfit, setOutfit] = useState([]);
  const [tab, setTab] = useState("today");
  const regenerate = useCallback((s) => { const o = buildOutfit(state.closet, { ...ctx, occasion: state.profile.occasion }, s); setOutfit(o); lastOutfit.current = o; }, [state.closet, ctx, state.profile.occasion, lastOutfit]);
  // Rebuild a slot list (item + swap options) from a set of item ids the stylist handed off.
  const loadFromIds = useCallback((ids) => {
    const slotName = { tops: "top", bottoms: "bottom", dresses: "dress", shoes: "shoes", bags: "bag", accessories: "accessory" };
    const o = ids.map((id) => {
      const item = state.closet.find((c) => c.id === id);
      if (!item) return null;
      const options = rank(state.closet.filter((i) => i.clean && i.category === item.category), { ...ctx, occasion: state.profile.occasion }, seed);
      return { slot: slotName[item.category] || item.category, item, options: options.length ? options : [item] };
    }).filter(Boolean);
    setOutfit(o); lastOutfit.current = o;
  }, [state.closet, ctx, state.profile.occasion, seed, lastOutfit]);
  // Regenerate when inputs change; honor a stylist hand-off first (so "Open on Outfit screen" loads that look).
  useEffect(() => {
    if (pendingOutfit && pendingOutfit.current && pendingOutfit.current.length) {
      const ids = pendingOutfit.current; pendingOutfit.current = null;
      loadFromIds(ids); setTab("today");
    } else {
      regenerate(seed);
    }
  }, [seed, state.profile.occasion, state.profile.city, state.closet]);

  const swapSlot = (slotIndex) => {
    setOutfit((prev) => {
      const next = [...prev]; const slot = next[slotIndex]; const opts = slot.options;
      const curIdx = opts.findIndex((o) => o.id === slot.item.id);
      next[slotIndex] = { ...slot, item: opts[(curIdx + 1) % opts.length] || slot.item };
      lastOutfit.current = next; return next;
    });
  };
  const savedLooks = state.saved.map((s) => ({ ...s, items: s.itemIds.map((id) => state.closet.find((c) => c.id === id)).filter(Boolean) })).filter((s) => s.items.length);

  return (
    <Page>
      <Header title="Outfit of the day" onBack={() => setView("home")} />
      <div style={styles.segmented}>
        <button onClick={() => setTab("today")} className="st-seg" style={{ flex: 1, border: "none", borderRadius: 11, padding: "9px 6px", fontWeight: 700, background: tab === "today" ? T.pinkDeep : "transparent", color: tab === "today" ? "#fff" : T.textSoft }}>Today</button>
        <button onClick={() => setTab("saved")} className="st-seg" style={{ flex: 1, border: "none", borderRadius: 11, padding: "9px 6px", fontWeight: 700, background: tab === "saved" ? T.pinkDeep : "transparent", color: tab === "saved" ? "#fff" : T.textSoft }}>Saved · {savedLooks.length}</button>
      </div>
      {tab === "today" && (
        <>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 4 }}>
            <span style={{ fontSize: 12, color: T.textSoft }}>For</span>
            {OCCASIONS.map((o) => <Pill key={o} active={state.profile.occasion === o} onClick={() => setProfile({ occasion: o })}>{o}</Pill>)}
          </div>
          <div style={{ fontSize: 12, color: T.textSoft, marginBottom: 10 }}>Ranked by {weather.tempF}° {weather.icon} weather, your {state.profile.aesthetics.join(" / ")} style, and what's clean.</div>
          {outfit.length === 0 ? (
            <Empty icon="🧺" title="Not enough clean clothes" body="Everything might be in the wash, or your closet's still small. Add items or mark a few clean.">
              <button className="st-primary" style={styles.primary} onClick={() => setView("closet")}>Open closet</button>
            </Empty>
          ) : (
            <>
              <div style={styles.outfitCard}>
                {outfit.map((s, idx) => (
                  <div key={s.slot} style={styles.outfitRow}>
                    <Swatch item={s.item} size={58} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 11, color: T.pinkDeep, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>{s.slot}</div>
                      <div style={{ fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.item.name}</div>
                      <div style={{ fontSize: 11, color: T.textSoft }}>{s.item.color} · {s.item.aesthetics.join(", ")}</div>
                    </div>
                    {s.options.length > 1 && <button className="st-ghost" style={styles.miniBtn} onClick={() => swapSlot(idx)}>Swap</button>}
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                <button className="st-ghost" style={{ ...styles.ghostBtn, flex: 1 }} onClick={() => setSeed((x) => x + 1)}>Reshuffle</button>
                <button className="st-ghost" style={{ ...styles.ghostBtn, flex: 1 }} onClick={() => saveOutfit(outfit)}>Save</button>
                <button className="st-ghost" style={{ ...styles.ghostBtn, flex: 1 }} onClick={() => setView("tryon")}>Try on</button>
                <button className="st-primary" style={{ ...styles.primary, flex: "1 1 100%" }} onClick={() => markWorn(outfit)}>Wear this today</button>
              </div>
            </>
          )}
        </>
      )}
      {tab === "saved" && (
        savedLooks.length === 0 ? <Empty icon="♡" title="No go-to looks yet" body="Save outfits you love and they'll live here." /> : (
          savedLooks.map((s) => (
            <div key={s.id} style={styles.outfitCard}>
              <div style={{ fontWeight: 700, marginBottom: 8 }}>{s.name}</div>
              <div style={styles.hscroll}>
                {s.items.map((it) => (
                  <div key={it.id} style={{ width: 64, textAlign: "center" }}>
                    <Swatch item={it} size={64} />
                    <div style={{ fontSize: 10, color: T.textSoft, marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{it.name}</div>
                  </div>
                ))}
              </div>
              <button className="st-primary" style={{ ...styles.primary, marginTop: 8 }} onClick={() => markWorn(s.items.map((it) => ({ item: it })))}>Wear this</button>
            </div>
          ))
        )
      )}
    </Page>
  );
}

/* TRY ON */
const CAT_W = { tops: 46, dresses: 52, bottoms: 44, shoes: 30, bags: 24, accessories: 26 };
const CAT_Y = { accessories: 14, tops: 27, dresses: 37, bags: 50, bottoms: 57, shoes: 82 };

// Live in-app camera: opens the device camera, captures a frame, returns a data URL.
function CameraModal({ onCapture, onClose }) {
  const videoRef = useRef();
  const streamRef = useRef(null);
  const [facing, setFacing] = useState("environment");
  const [error, setError] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setError(null); setReady(false);
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("unsupported");
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: false });
        if (cancelled) { stream.getTracks().forEach((t) => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; try { await videoRef.current.play(); } catch (_) {} }
        setReady(true);
      } catch (e) {
        const denied = e && (e.name === "NotAllowedError" || e.name === "SecurityError");
        setError(denied
          ? "Camera access was blocked. Allow the camera in your browser, or use Upload instead."
          : "Couldn't open the camera on this device. Use Upload instead.");
      }
    })();
    return () => { cancelled = true; if (streamRef.current) { streamRef.current.getTracks().forEach((t) => t.stop()); streamRef.current = null; } };
  }, [facing]);

  const snap = () => {
    const v = videoRef.current; if (!v || !v.videoWidth) return;
    const max = 760;
    const scale = Math.min(1, max / Math.max(v.videoWidth, v.videoHeight));
    const w = Math.round(v.videoWidth * scale), h = Math.round(v.videoHeight * scale);
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    if (facing === "user") { ctx.translate(w, 0); ctx.scale(-1, 1); } // un-mirror selfie to match preview
    ctx.drawImage(v, 0, 0, w, h);
    onCapture(c.toDataURL("image/jpeg", 0.82));
  };

  return (
    <div style={styles.camWrap}>
      <div style={styles.camStage}>
        {error
          ? <div style={{ textAlign: "center", color: "#fff", padding: 28, fontSize: 14, lineHeight: 1.5 }}>{error}</div>
          : <video ref={videoRef} playsInline muted autoPlay style={{ width: "100%", height: "100%", objectFit: "cover", transform: facing === "user" ? "scaleX(-1)" : "none" }} />}
        <div style={styles.camHint}>Fit your full body in frame</div>
      </div>
      <div style={styles.camBar}>
        <button className="st-ghost" style={styles.camSecondary} onClick={onClose}>Cancel</button>
        <button aria-label="Take photo" onClick={snap} disabled={!!error || !ready} style={{ ...styles.camShutter, opacity: (!!error || !ready) ? .5 : 1 }}><span style={styles.camShutterInner} /></button>
        <button className="st-ghost" style={styles.camSecondary} onClick={() => setFacing((f) => (f === "user" ? "environment" : "user"))}>Flip</button>
      </div>
    </div>
  );
}

function TryOn({ state, setProfile, setView, showToast }) {
  const bodyRef = useRef(), faceRef = useRef(), stageRef = useRef(), dragRef = useRef(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [camOpen, setCamOpen] = useState(false);
  const hasPhoto = !!state.profile.bodyPhoto;

  // placed garments on the photo: { uid, itemId, xPct, yPct, scale, z } — persisted in profile.tryon
  const [placed, setPlaced] = useState(() => (state.profile.tryon || []).filter((p) => state.closet.some((c) => c.id === p.itemId)));
  const [selected, setSelected] = useState(null);
  const placedRef = useRef(placed);
  useEffect(() => { placedRef.current = placed; }, [placed]);
  const zTop = useRef(placed.reduce((m, p) => Math.max(m, p.z || 1), 1));

  const itemById = (id) => state.closet.find((c) => c.id === id);
  const save = (next) => { setPlaced(next); setProfile({ tryon: next }); };

  const setBody = async (f) => { const url = await fileToScaledDataURL(f, 620); setProfile({ bodyPhoto: url }); showToast("Body photo saved for try-on"); };

  const addToBody = (item) => {
    if (!hasPhoto) { showToast("Add your photo first"); return; }
    zTop.current += 1;
    const p = { uid: nid(), itemId: item.id, xPct: item.category === "bags" ? 72 : 50, yPct: CAT_Y[item.category] || 45, scale: 1, z: zTop.current };
    save([...placed, p]); setSelected(p.uid);
  };
  const removeP = (uid) => { save(placed.filter((p) => p.uid !== uid)); setSelected(null); };
  const clearAll = () => { save([]); setSelected(null); };
  const resize = (uid, d) => save(placed.map((p) => (p.uid === uid ? { ...p, scale: Math.max(0.4, Math.min(2.4, +(p.scale + d).toFixed(2))) } : p)));
  const bringFront = (uid) => { zTop.current += 1; save(placed.map((p) => (p.uid === uid ? { ...p, z: zTop.current } : p))); };

  // drag to position (mouse + touch via pointer events)
  const startDrag = (e, uid) => {
    e.stopPropagation(); setSelected(uid);
    const p = placed.find((x) => x.uid === uid); if (!p) return;
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
    dragRef.current = { uid, sx: e.clientX, sy: e.clientY, ox: p.xPct, oy: p.yPct };
  };
  const onDrag = (e, uid) => {
    if (!dragRef.current || dragRef.current.uid !== uid || !stageRef.current) return;
    const r = stageRef.current.getBoundingClientRect();
    let nx = dragRef.current.ox + ((e.clientX - dragRef.current.sx) / r.width) * 100;
    let ny = dragRef.current.oy + ((e.clientY - dragRef.current.sy) / r.height) * 100;
    nx = Math.max(3, Math.min(97, nx)); ny = Math.max(3, Math.min(97, ny));
    setPlaced((prev) => prev.map((p) => (p.uid === uid ? { ...p, xPct: nx, yPct: ny } : p)));
  };
  const endDrag = (e, uid) => { if (dragRef.current && dragRef.current.uid === uid) { dragRef.current = null; setProfile({ tryon: placedRef.current }); } };

  const doUndertone = async (f) => {
    setAnalyzing(true);
    try {
      const url = await fileToScaledDataURL(f, 320);
      // [[ VISION_AI: SKIN_UNDERTONE ]] Claude reads the undertone; falls back to the pixel heuristic.
      const ai = await visionClassify("undertone", url);
      const tone = (ai && ai.undertone) || await analyzeUndertone(url); // analyzed, then discarded — never stored
      setProfile({ undertone: tone });
      showToast(`Undertone read as ${tone} — photo wasn't saved`);
    } catch (e) {
      showToast("Couldn't read that photo — try another.");
    } finally {
      setAnalyzing(false); // never leave the button stuck on "Analyzing…"
    }
  };

  return (
    <Page>
      <Header title="Try it on" onBack={() => setView("home")} right={placed.length ? <button className="st-ghost" style={{ ...styles.ghostBtn, width: "auto", padding: "6px 12px" }} onClick={clearAll}>Clear</button> : null} />

      <div ref={stageRef} style={styles.tryonStage} onPointerDown={() => setSelected(null)}>
        {hasPhoto ? (
          <>
            <img src={state.profile.bodyPhoto} alt="you" style={{ width: "100%", height: "100%", objectFit: "cover", pointerEvents: "none" }} />
            {/* [[ VISION_AI: VIRTUAL_TRY_ON ]] real garment warping/fitting goes here.
                For now each selected piece is a draggable, resizable overlay you position by hand. */}
            {placed.map((p) => {
              const it = itemById(p.itemId); if (!it) return null;
              return (
                <div key={p.uid}
                  onPointerDown={(e) => startDrag(e, p.uid)}
                  onPointerMove={(e) => onDrag(e, p.uid)}
                  onPointerUp={(e) => endDrag(e, p.uid)}
                  style={{
                    position: "absolute", left: `${p.xPct}%`, top: `${p.yPct}%`,
                    width: `${CAT_W[it.category] || 40}%`,

/* STYLIST CHAT */
function Chat({ state, update, ctx, setView, lastOutfit, saveOutfit, pendingOutfit }) {
  const [text, setText] = useState("");
  const endRef = useRef();
  useEffect(() => { endRef.current && endRef.current.scrollIntoView({ behavior: "smooth" }); }, [state.chat.length]);
  const send = (msg) => {
    const message = (msg || text).trim(); if (!message) return; setText("");
    const reply = stylistReply(message, state, ctx, { lastOutfit: lastOutfit.current, saveOutfit });
    update((s) => { s.chat = [...s.chat, { role: "user", text: message }, { role: "stylist", text: reply.text, outfit: reply.outfit ? reply.outfit.map((o) => o.item.id) : null }]; return s; });
    if (reply.outfit) lastOutfit.current = reply.outfit;
  };
  const quick = ["What's clean?", `Outfit for ${ctx.occasion}`, "Make it warmer", "What goes with my silk blouse?"];
  return (
    <Page noScroll>
      <Header title="Stylist" onBack={() => setView("home")} />
      <div style={styles.chatScroll}>
        {state.chat.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
            <div style={{ ...styles.bubble, background: m.role === "user" ? T.pinkDeep : T.card, color: m.role === "user" ? "#fff" : T.text, borderBottomRightRadius: m.role === "user" ? 4 : 16, borderBottomLeftRadius: m.role === "user" ? 16 : 4 }}>
              {m.text}
              {m.outfit && <button className="st-ghost" style={{ ...styles.miniBtn, marginTop: 8, display: "block" }} onClick={() => { if (pendingOutfit) pendingOutfit.current = m.outfit; setView("ootd"); }}>Open on Outfit screen →</button>}
            </div>
          </div>
        ))}
        <div ref={endRef} />
      </div>
      <div style={styles.hscroll}>{quick.map((q) => <Pill key={q} onClick={() => send(q)}>{q}</Pill>)}</div>
      <div style={styles.chatInputRow}>
        <input style={{ ...styles.input, marginBottom: 0 }} value={text} placeholder="Ask your stylist…" onChange={(e) => setText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && send()} />
        <button className="st-primary" style={{ ...styles.primary, width: "auto", padding: "0 18px" }} onClick={() => send()}>Send</button>
      </div>
    </Page>
  );
}

  const looks = LOOKS.filter((l) => (celebOnly ? l.celeb : true));
  const photoInput = useRef();

  const onPhoto = async (e) => {
    const f = e.target.files[0]; const id = uploadFor.current; if (!f || !id) return;
    const url = await fileToScaledDataURL(f, 480, 0.78);
    update((s) => { s.celebPhotos = { ...(s.celebPhotos || {}), [id]: url }; return s; });
    showToast("Photo added");

            {/* header: user-supplied photo if present, otherwise the colour card */}
            <div style={{ height: 112, borderRadius: 16, overflow: "hidden", display: "flex", alignItems: "flex-end", padding: 12, color: "#fff", position: "relative",
              background: photo ? `linear-gradient(to top, rgba(0,0,0,.6), rgba(0,0,0,.05)), center/cover url(${photo})` : `linear-gradient(135deg, ${look.grad[0]}, ${look.grad[1]})` }}>
              <div style={{ position: "relative", zIndex: 1 }}>
                <div style={{ fontFamily: "Fraunces, serif", fontSize: 21, textShadow: "0 1px 5px rgba(0,0,0,.4)" }}>{look.name}</div>
                <div style={{ fontSize: 11.5, opacity: .96, textShadow: "0 1px 4px rgba(0,0,0,.4)" }}>{look.vibe}</div>
              </div>
              <div style={styles.matchBadge}>{pct}% match</div>

            </div>

            {look.pieces && (
              <>
                <div style={{ ...styles.miniLabel, marginTop: 10 }}>The outfit</div>
                <div style={styles.flatlay}>
                  {look.pieces.map((p, i) => (
                    <div key={i} style={styles.flatItem}><GarmentSVG kind={p.kind} color={p.color} size={50} /></div>
                  ))}
                </div>
              </>
            )}

            {look.desc && <div style={{ fontSize: 12, color: T.textSoft, lineHeight: 1.45, marginTop: 8 }}>{look.desc}</div>}

            {/* recreate from your closet */}
            <div style={{ ...styles.miniLabel, marginTop: 10 }}>From your closet</div>
            <div style={styles.hscroll}>
              {chosen.map((c, i) => c.missing ? (

                  <div style={{ width: 62, height: 62, borderRadius: 14, border: `1.5px dashed ${T.pink}`, display: "flex", alignItems: "center", justifyContent: "center", color: T.pink, fontSize: 22 }}>＋</div>

              <span style={{ fontSize: 12, color: missing ? T.rose : T.clean, fontWeight: 600 }}>{missing ? `${missing} piece${missing > 1 ? "s" : ""} missing` : "You own this whole look ✓"}</span>
              <button className="st-ghost" style={{ ...styles.miniBtn, marginLeft: "auto" }} onClick={() => { const owned = chosen.filter((c) => !c.missing); if (owned.length) saveOutfit(owned.map((it) => ({ item: it })), look.name); else showToast("Add some pieces first"); }}>Save look</button>
